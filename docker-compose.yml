# =============================================================================
# AlphaWise-Elite — EC2 #1 (alphawise-1-db) Data Layer
# CONSTITUTION.md Madde 13.1 & 16.3 uyumlu
# Optimize: t2/t3.micro (1 GB RAM) — kişisel kullanım
# =============================================================================

name: alphawise-db

networks:
  alphawise-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  chroma_data:

services:
  # ---------------------------------------------------------------------------
  # 1) PostgreSQL 16 + TimescaleDB
  #    Fiyat/makro verisi hypertable'lar için TimescaleDB gerekli (Madde 16.3)
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: alphawise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alphawise}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      # 1 GB RAM için TimescaleDB tuning (agresif küçültme)
      TS_TUNE_MEMORY: 512MB
      TS_TUNE_NUM_CPUS: 1
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_statement=none"
    ports:
      # Sadece Tailscale ağı üzerinden erişilecekse 127.0.0.1'e bind edip
      # Tailscale IP'sini kullanmak daha güvenli. Şimdilik tüm interface.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-alphawise}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - alphawise-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 2) Redis 7 — 4 logical DB (Madde 16.3)
  #    DB0=cache | DB1=rate-limit | DB2=task-queue | DB3=pub/sub
  #    AOF persistence açık, maxmemory sınırlı (t2.micro için)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: alphawise-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--databases"
      - "16"
      - "--maxmemory"
      - "128mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - "900 1"
      - "--save"
      - "300 10"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - alphawise-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 3) ChromaDB — vektör hafıza (Madde 16.3)
  #    Qdrant failover ileride eklenecek (bu adımda kapsam dışı)
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:0.5.15
    container_name: alphawise-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_AUTHN_PROVIDER: "chromadb.auth.token_authn.TokenAuthenticationServerProvider"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_AUTH_TOKEN:?CHROMA_AUTH_TOKEN required}
      CHROMA_AUTH_TOKEN_TRANSPORT_HEADER: "Authorization"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -fsS http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - alphawise-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
